name: Build Service

on:
  workflow_dispatch:
  pull_request:
    paths-ignore: ['*.md']
    branches: ['main', 'master', 'update/040']
  push:
    paths-ignore: ['*.md']
    branches: ['main', 'master', 'update/040']

jobs:
  BuildARM:
    name: Build ARM S9PK
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Prepare StartOS SDK
        uses: k0gen/sdk@v3-optimization

      - name: Checkout services repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build ARM package
        run: |
          start-cli init
          RUST_LOG=debug RUST_BACKTRACE=1 make aarch64
          
          ARCH_PACKAGE=$(ls *_aarch64.s9pk | head -n1)
          echo "arch_package=${ARCH_PACKAGE}" >> $GITHUB_ENV
          
          printf "\n ARM SHA256: $(sha256sum ${ARCH_PACKAGE}) \n"

      - name: Export Docker images for cache
        run: |
          # Export only the images we need (based on your test results)
          echo "Exporting Docker images for cache..."
          
          # Check if images exist and export them
          if docker image inspect start9/hello-world:latest >/dev/null 2>&1; then
            docker save "start9/hello-world:latest" -o "start9_hello-world_latest.tar"
            echo "Exported start9/hello-world:latest"
          fi
          
          if docker image inspect ghcr.io/start9labs/sdk/utils:latest >/dev/null 2>&1; then
            docker save "ghcr.io/start9labs/sdk/utils:latest" -o "ghcr_io_start9labs_sdk_utils_latest.tar"
            echo "Exported ghcr.io/start9labs/sdk/utils:latest"
          fi
          
          # List exported files
          ls -la *.tar 2>/dev/null || echo "No Docker images cached"

      - name: Upload ARM package
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.arch_package }}
          path: ./${{ env.arch_package }}

      - name: Upload Docker cache
        uses: actions/upload-artifact@v4
        with:
          name: docker-cache-arm
          path: "*.tar"
          if-no-files-found: ignore

  BuildIntelAndUniversal:
    name: Build Intel + Universal S9PK
    runs-on: ubuntu-24.04
    needs: BuildARM
    steps:
      - name: Prepare StartOS SDK
        uses: k0gen/sdk@v3-optimization

      - name: Checkout services repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Download Docker cache from ARM
        uses: actions/download-artifact@v4
        with:
          name: docker-cache-arm
          path: docker-cache/

      - name: Import Docker images
        run: |
          echo "Importing Docker images from ARM build..."
          
          if [ -d "docker-cache" ] && [ -n "$(ls -A docker-cache/*.tar 2>/dev/null)" ]; then
            for tar_file in docker-cache/*.tar; do
              if [ -f "$tar_file" ]; then
                echo "Loading $(basename $tar_file)"
                docker load -i "$tar_file"
              fi
            done
            
            echo "Available Docker images after import:"
            docker image ls | grep -E "(start9/hello-world|ghcr.io/start9labs/sdk/utils)"
          else
            echo "No Docker cache to import"
          fi

      - name: Build Intel package (with Docker cache)
        run: |
          start-cli init
          
          echo "Building x86_64 package with imported Docker cache..."
          time RUST_LOG=debug RUST_BACKTRACE=1 make x86_64
          
          X86_PACKAGE=$(ls *_x86_64.s9pk | head -n1)
          echo "x86_package=${X86_PACKAGE}" >> $GITHUB_ENV
          
          printf "\n Intel SHA256: $(sha256sum ${X86_PACKAGE}) \n"

      - name: Build Universal package (very fast with cache)
        run: |
          # Clean arch-specific packages to avoid conflicts
          rm -f *_aarch64.s9pk *_x86_64.s9pk
          
          echo "Building universal package with full Docker cache..."
          time RUST_LOG=debug RUST_BACKTRACE=1 make
          
          UNIVERSAL_PACKAGE=$(ls *.s9pk | head -n1)
          echo "universal_package=${UNIVERSAL_PACKAGE}" >> $GITHUB_ENV
          
          printf "\n Universal SHA256: $(sha256sum ${UNIVERSAL_PACKAGE}) \n"

      - name: Upload Intel package
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.x86_package }}
          path: ./${{ env.x86_package }}

      - name: Upload Universal package
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.universal_package }}
          path: ./${{ env.universal_package }}
