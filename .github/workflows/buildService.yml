name: Build Service

on:
  workflow_dispatch:
  pull_request:
    paths-ignore: ['*.md']
    branches: ['main', 'master', 'update/040']
  push:
    paths-ignore: ['*.md']
    branches: ['main', 'master', 'update/040']

jobs:
  BuildARM:
    name: Build S9PK for aarch64
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Prepare StartOS SDK
        uses: k0gen/sdk@v3-optimization

      - name: Checkout services repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ARM package with Docker cache export
        run: |
          start-cli init
          
          # Build with Docker cache export to GitHub Actions cache
          DOCKER_BUILDKIT=1 \
          BUILDX_EXPERIMENTAL=1 \
          RUST_LOG=debug RUST_BACKTRACE=1 \
          make aarch64 \
          CACHE_FROM="type=gha,scope=arm-cache" \
          CACHE_TO="type=gha,mode=max,scope=arm-cache"
          
          # Find the generated package
          ARCH_PACKAGE=$(ls *_aarch64.s9pk | head -n1)
          PACKAGE_ID=$(start-cli s9pk inspect "$ARCH_PACKAGE" manifest | jq -r '.id')
          
          echo "package_id=${PACKAGE_ID}" >> $GITHUB_ENV
          echo "arch_package=${ARCH_PACKAGE}" >> $GITHUB_ENV
          
          printf "\n ARM SHA256SUM: $(sha256sum ${ARCH_PACKAGE}) \n"

      - name: Upload ARM .s9pk
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.arch_package }}
          path: ./${{ env.arch_package }}

      # Upload JS/TS build artifacts
      - name: Upload ARM build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: arm-build-artifacts
          path: |
            node_modules/
            .npm/
            package-lock.json
            yarn.lock
            dist/
            build/
            assets/
            .next/
            .nuxt/
            public/build/
            www/
            scripts/
          if-no-files-found: ignore

  BuildIntelAndUniversal:
    name: Build x86_64 and Universal S9PK
    runs-on: ubuntu-24.04
    needs: BuildARM
    steps:
      - name: Prepare StartOS SDK
        uses: k0gen/sdk@v3-optimization

      - name: Checkout services repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Download ARM build artifacts
        uses: actions/download-artifact@v4
        with:
          name: arm-build-artifacts
          path: .

      - name: Build x86_64 with shared artifacts and Docker cache
        run: |
          start-cli init
          
          echo "Shared artifacts available:"
          ls -la node_modules/ 2>/dev/null && echo "✅ node_modules" || echo "❌ No node_modules"
          ls -la dist/ 2>/dev/null && echo "✅ dist/" || echo "❌ No dist/"
          
          # Build x86_64 with Docker cache import from ARM build and export for intel
          DOCKER_BUILDKIT=1 \
          BUILDX_EXPERIMENTAL=1 \
          RUST_LOG=debug RUST_BACKTRACE=1 \
          make x86_64 \
          CACHE_FROM="type=gha,scope=arm-cache type=gha,scope=intel-cache" \
          CACHE_TO="type=gha,mode=max,scope=intel-cache"
          
          # Find the generated x86_64 package
          X86_PACKAGE=$(ls *_x86_64.s9pk | head -n1)
          echo "x86_package=${X86_PACKAGE}" >> $GITHUB_ENV
          
          printf "\n x86_64 SHA256SUM: $(sha256sum ${X86_PACKAGE}) \n"

      - name: Clean arch packages before universal build
        run: |
          # Remove arch-specific packages to avoid conflicts
          rm -f *_aarch64.s9pk *_x86_64.s9pk
          echo "Cleaned arch packages for universal build"

      - name: Build universal package with full cache
        run: |
          echo "Building universal package with Docker cache from both architectures..."
          
          # Universal build using cache from both ARM and Intel builds
          DOCKER_BUILDKIT=1 \
          BUILDX_EXPERIMENTAL=1 \
          RUST_LOG=debug RUST_BACKTRACE=1 \
          make \
          CACHE_FROM="type=gha,scope=arm-cache type=gha,scope=intel-cache"
          
          # Find the universal package
          UNIVERSAL_PACKAGE=$(ls *.s9pk | head -n1)
          
          if [ -f "$UNIVERSAL_PACKAGE" ]; then
            echo "universal_package=${UNIVERSAL_PACKAGE}" >> $GITHUB_ENV
            printf "\n Universal Package SHA256SUM: $(sha256sum ${UNIVERSAL_PACKAGE}) \n"
          else
            echo "❌ Universal package not found"
            ls -la
            exit 1
          fi

      - name: Upload x86_64 .s9pk
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.x86_package }}
          path: ./${{ env.x86_package }}

      - name: Upload Universal .s9pk
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.universal_package }}
          path: ./${{ env.universal_package }}
