name: Build Service

on:
  workflow_dispatch:
  pull_request:
    paths-ignore: ['*.md']
    branches: ['main', 'master', 'update/040']
  push:
    paths-ignore: ['*.md']
    branches: ['main', 'master', 'update/040']

jobs:
  BuildARM:
    name: Build S9PK for aarch64
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Prepare StartOS SDK
        uses: k0gen/sdk@v3-optimization

      - name: Checkout services repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build ARM package and preserve artifacts
        run: |
          start-cli init
          RUST_LOG=debug RUST_BACKTRACE=1 make aarch64
          
          # Find the generated package
          ARCH_PACKAGE=$(ls *_aarch64.s9pk | head -n1)
          PACKAGE_ID=$(start-cli s9pk inspect "$ARCH_PACKAGE" manifest | jq -r '.id')
          
          echo "package_id=${PACKAGE_ID}" >> $GITHUB_ENV
          echo "arch_package=${ARCH_PACKAGE}" >> $GITHUB_ENV
          
          printf "\n ARM SHA256SUM: $(sha256sum ${ARCH_PACKAGE}) \n"

      - name: Upload ARM .s9pk
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.arch_package }}
          path: ./${{ env.arch_package }}

      # Upload build artifacts that can be shared for faster universal build
      - name: Upload ARM build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: arm-build-artifacts
          path: |
            node_modules/
            package-lock.json
          if-no-files-found: ignore

  BuildIntelAndUniversal:
    name: Build x86_64 and Universal S9PK
    runs-on: ubuntu-24.04
    needs: BuildARM
    steps:
      - name: Prepare StartOS SDK
        uses: k0gen/sdk@v3-optimization

      - name: Checkout services repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Download ARM build artifacts
        uses: actions/download-artifact@v4
        with:
          name: arm-build-artifacts
          path: .

      - name: Download ARM package
        uses: actions/download-artifact@v4
        with:
          pattern: "*_aarch64.s9pk"
          path: arm-package

      - name: Setup and build x86_64 package
        run: |
          start-cli init
          
          # Move ARM package to current directory
          find arm-package -name "*_aarch64.s9pk" -exec mv {} . \;
          
          echo "Files available for x86_64 build:"
          ls -la *.s9pk 2>/dev/null || echo "No s9pk files yet"
          ls -la node_modules/ 2>/dev/null && echo "node_modules available" || echo "No node_modules"
          
          # Build x86_64 package (this should be faster with shared node_modules)
          RUST_LOG=debug RUST_BACKTRACE=1 make x86_64
          
          # Find the generated x86_64 package
          X86_PACKAGE=$(ls *_x86_64.s9pk | head -n1)
          echo "x86_package=${X86_PACKAGE}" >> $GITHUB_ENV
          
          printf "\n x86_64 SHA256SUM: $(sha256sum ${X86_PACKAGE}) \n"

      - name: Build universal package
        run: |
          echo "Building universal package with available artifacts:"
          ls -la *.s9pk
          
          # Now we have both arch packages and shared build artifacts
          # This should be very fast since node_modules and other artifacts are already available
          RUST_LOG=debug RUST_BACKTRACE=1 make
          
          # Find the universal package
          UNIVERSAL_PACKAGE=$(ls *.s9pk | grep -v "_aarch64\|_x86_64" | head -n1)
          
          if [ -f "$UNIVERSAL_PACKAGE" ]; then
            echo "universal_package=${UNIVERSAL_PACKAGE}" >> $GITHUB_ENV
            printf "\n Universal Package SHA256SUM: $(sha256sum ${UNIVERSAL_PACKAGE}) \n"
            
            # Show final artifacts
            echo "Final build artifacts:"
            ls -la *.s9pk
          else
            echo "❌ Universal package not found"
            echo "Available files:"
            ls -la *.s9pk
            exit 1
          fi

      - name: Upload x86_64 .s9pk
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.x86_package }}
          path: ./${{ env.x86_package }}

      - name: Upload Universal .s9pk
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.universal_package }}
          path: ./${{ env.universal_package }}
